name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # This allows you to run it manually from the Actions tab!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Gradle Wrapper
      # THIS IS THE MAGIC STEP: It creates the missing .jar file on the server
      run: gradle wrapper --gradle-version 8.9

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Debug APK
      # This builds the app and forces AndroidX compatibility
      run: ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
