name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Cache
      uses: gradle/actions/setup-gradle@v3

    - name: Make gradlew executable
      # This prevents "Permission denied" errors on the wrapper script
      run: chmod +x ./gradlew

    - name: Build Debug APK
      # Passing the properties here directly overrides any missing files
      run: ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
